<svg width="512" height="512" viewBox="0 0 512 512" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <defs>
        <!-- Styles dynamiques pour le Light / Dark mode -->
        <style>
            :root {
            /* Couleurs par défaut (Dark Mode) */
            --text-main: #ffffff;
            --text-sub: #00d2ff;
            --grad-stop1: #ffffff;
            --grad-stop2: #00ffff;
            }

            @media (prefers-color-scheme: light) {
            :root {
            --text-main: #0f172a;
            --text-sub: #0047ab;
            --grad-stop1: #ffffff;
            --grad-stop2: #00ffff;
            }
            }

            .main-text { fill: var(--text-main); }
            .sub-text { fill: var(--text-sub); }
            .stop1 { stop-color: var(--grad-stop1); }
            .stop2 { stop-color: var(--grad-stop2); }
        </style>

        <!-- Dégradé Flamme Bleue Intense Dynamique -->
        <linearGradient id="linearGradient9230">
            <stop class="stop1" style="stop-opacity:1;" offset="0" />
            <stop class="stop2" style="stop-opacity:1;" offset="0.3" />
            <stop style="stop-color:#0055ff;stop-opacity:1;" offset="0.7" />
            <stop style="stop-color:#0013e1;stop-opacity:1;" offset="1" />
        </linearGradient>
        <radialGradient id="radialGradient9231" xlink:href="#linearGradient9230" cx="228.26128" cy="276.51999" fx="228.26128" fy="276.51999" r="163.19557" gradientTransform="matrix(1.1002345,-0.02505863,0.01716566,0.75368269,-27.626313,47.027452)" gradientUnits="userSpaceOnUse" />

        <!-- Effet de lueur (Neon Glow) -->
        <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
            <!-- Différents niveaux de flou pour une lueur réaliste -->
            <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur1" />
            <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur2" />
            <feGaussianBlur in="SourceGraphic" stdDeviation="15" result="blur3" />
            <!-- Fusion des couches de flou avec l'image originale -->
            <feMerge>
                <feMergeNode in="blur3" />
                <feMergeNode in="blur2" />
                <feMergeNode in="blur1" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- L'arrière-plan a été retiré pour avoir de la transparence -->

