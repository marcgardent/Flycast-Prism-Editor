name: flycast-viewer
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.10
  - tk=*=xft_*  # Force l'installation du build avec support XFT
  - numpy
  - pillow
  - pip
  - pip:
    - customtkinter
    - platformdirs
    - openimageio
    - imageio